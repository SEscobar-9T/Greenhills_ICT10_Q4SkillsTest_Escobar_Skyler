<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>
    <title>Skills Test</title>
    <py-config>
        packages = ['numpy', 'matplotlib']
    </py-config>
    <style>
        body {
            font-family:'Courier New', Courier, monospace;
            background-color: rgb(247, 58, 58);
        }

        form {
            background-color: rgb(238, 220, 131) ;
            border-radius: 10px;
            padding: 40px;
            margin: 0 auto;
            width: 700px;
            text-align: center;
        }

        h2 {
            font-size: 35px;
            color: rgb(238, 220, 131);
            background-color: rgb(247, 58, 58);
            border-radius: 10px;
            text-align: center;
        }

        button {
            background-color: rgb(247, 58, 58);
            color: white;
            font-size: 15px;
        }

        .dropbtn {
            background-color: rgb(247, 58, 58);
            color: white;
            font-size: 15px;
            border-radius: 10px;
            padding: 5px;
            margin: 0 auto;
        }

        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            min-width: 160px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
            z-index: 1;
        }

        .dropdown-content a {
            color: black;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
        }

        .dropdown-content a:hover {
            background-color: #ddd;
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }

        .dropdown:hover .dropbtn {
            background-color: rgb(247, 58, 58);
        }
    </style>
</head>
<body>
    
    <form>
        <h2><marquee>- Attendance Tracker -</marquee></h2>
        <hr />
        <br>
        <br>

        <a><strong>Select Day:</strong></a>
        <div class="dropdown">
        <!-- <button class="dropbtn">Weekday</button> -->
        <select  id="absent_day">
            <option value="0">Monday</a>
            <option value="1">Tuesday</a>
            <option value="2">Wednesday</a>
            <option value="3">Thursday</a>
            <option value="4">Friday</a>
        </select>
        </div>
        <br>
        <br>


        <a><strong>Absences:</strong></a>
        <input type="number" id="input" placeholder="enter number of days absent:">
        <br>
        <br>
       
        <button type="button" py-click="attend_track" value="absence_click" >Show Graph</button>
        <br>
        <br>
        <hr />

    </form>

    <div id="output"></div>
    <py-script src="main.py"></py-script>

</body>
</html>
